{% extends "base.html" %}
{% block title %}Register — PaperTrader{% endblock %}
{% block content %}
<div class="form-container" style="margin: 5rem auto;">
    <div class="form-card">
        <h1 style="text-align: center; margin-bottom: 0.25rem;">Create an Account</h1>
        <p class="form-subtitle" style="text-align: center;">Get started with $100,000.00 in mock trading cash.</p>
        
        <form method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" value="{{ username or '' }}" autofocus required placeholder="yourusername">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ email or '' }}" required placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 1.25rem; width: 100%;">Create Free Account</button>
        </form>
        
        <p class="form-footer-link" style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">
            Includes immediate registration of a default cash portfolio.
        </p>
        
        <p class="form-footer-link">
            Already registered? <a href="{{ url_for('login') }}" style="color: var(--accent-blue);">Log in here</a>.
        </p>
    </div>
</div>
{% endblock %}
